name: Build

on:
  push:
    tags:
      - "v*"          # 推 tag (e.g. v1.0.0) 時自動 build + release
  workflow_dispatch:  # 也可手動在 Actions 頁面觸發

jobs:
  build:
    runs-on: windows-latest  # 用 Windows runner 確保 .exe 相容

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile
        run: |
          deno compile --allow-all --sloppy-imports --icon assets/logo.ico --output dist/main.exe src/index.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ilearning-auto-windows
          path: dist/main.exe

      # 只有 push tag 時才建立 Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/main.exe
          generate_release_notes: true
